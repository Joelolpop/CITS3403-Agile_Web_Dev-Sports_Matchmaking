{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

  <!-- Player cards -->
  <div class="row g-3">
    {% for player in players %}
    <div class="col-12 col-md-6 col-lg-4">
      <div class="card h-100 bg-dark text-white">
        <div class="card-body">
          <h5 class="card-title">{{ player.username }}</h5>
          <p class="card-text text-white">{{ player.location }}</p>
          <p class="card-text text-white">{{ player.sport }} - {{ player.skill_level }}</p>
          <div class="mt-3">
            <button onclick = "removeCard(event)" class="btn btn-sm btn-outline-success w-100">Connect</button>
          </div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>

</div>
<script src="{{ url_for('static', filename='js/matching.js') }}"></script>
{% endblock %}
