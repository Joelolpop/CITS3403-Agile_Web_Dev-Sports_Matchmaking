{% extends "base.html" %}
{% block content %}

<div class="py-4">
    <h1>Your <span class="text-success">Friends</span></h1>
</div>

<div class="row g-4">
    {% for friend in friends %}
    <div class="col-12 col-md-6 col-lg-4">
        <div class="card h-100 border-success shadow-sm" style="background: var(--background-nav);">
            <div class="card-body d-flex flex-column">
                <div class="d-flex align-items-center mb-3">
                    <div>
                        <h5 class="mb-0 text-white">{{ friend.username }}</h5>
                        <small class="text-secondary">{{ friend.postcode }}</small>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="small text-secondary d-block mb-1">Sports:</label>
                    <div class="d-flex flex-wrap gap-1">
                        {% for sport in friend.sports %}
                        <span class="badge bg-dark text-success border border-success" style="font-size: 0.75rem;">
                            {{ sport }}
                        </span>
                        {% endfor %}
                    </div>
                </div>

                <a href="{{ url_for('main.friend_data', friend_id=friend.id) }}" class="btn btn-outline-success btn-sm mt-auto">View Profile</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
